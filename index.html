<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stinge | Aura Profile</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="liquid-bg" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="noise"></div>

    <main class="container" id="card">
        <header class="profile">
            <div class="avatar-wrap">
                <div class="status-pulse"></div>
                <img src="https://i.ibb.co/zCxMt6J/a536a0dbdf6bad6160c800217589cdee-tplv-tiktokx-cropcenter-1080-1080.jpg" alt="Avatar" class="avatar">
            </div>
            <h1 class="glitch-text">Stinge</h1>
            <p class="greeting" id="greeting">Willkommen</p>
        </header>

        <div class="tabs-nav">
            <button class="tab-btn active" onclick="openTab(event, 'links')">Links</button>
            <button class="tab-btn" onclick="openTab(event, 'stats')">Stats</button>
        </div>

        <div id="links" class="tab-content active">
            <div class="links-grid">
                <a href="https://www.tiktok.com/@woxrixbs" target="_blank" class="glass-link">
                    <i class="fab fa-tiktok"></i>
                    <span>TikTok</span>
                    <i class="fas fa-external-link-alt arrow"></i>
                </a>
                
                <div class="glass-link" onclick="copyId(this)">
                    <i class="fas fa-gamepad"></i>
                    <span id="player-id">#PRQ8L8G99</span>
                    <i class="fas fa-copy arrow"></i>
                    <div class="copy-toast">Kopiert!</div>
                </div>
            </div>
        </div>

        <div id="stats" class="tab-content">
            <div class="stats-container">
                <div class="stat-card">
                    <span class="stat-value">75K+</span>
                    <span class="stat-label">Trophäen</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value">Rank 35</span>
                    <span class="stat-label">Highest</span>
                </div>
            </div>
        </div>

        <footer class="footer">
            woxrix.aura &copy; 2026
        </footer>
    </main>

    <script>
        // Tab Logik
        function openTab(evt, tabName) {
            const contents = document.querySelectorAll(".tab-content");
            contents.forEach(content => content.classList.remove("active"));
            
            const buttons = document.querySelectorAll(".tab-btn");
            buttons.forEach(btn => btn.classList.remove("active"));

            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // Copy ID Funktion
        function copyId(el) {
            const id = document.getElementById('player-id').innerText;
            navigator.clipboard.writeText(id);
            el.classList.add('copied');
            setTimeout(() => el.classList.remove('copied'), 2000);
        }

        // Dynamic Greeting
        const hr = new Date().getHours();
        const g = document.getElementById('greeting');
        if (hr < 12) g.innerText = "Guten Morgen";
        else if (hr < 18) g.innerText = "Guten Tag";
        else g.innerText = "Guten Abend";

        // 3D Tilt Effekt
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 25;
            const y = (window.innerHeight / 2 - e.clientY) / 25;
            card.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>
</html>
