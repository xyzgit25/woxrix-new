<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stinge | Aura Pro</title>
    
    <meta property="og:title" content="Stinge | Aura">
    <meta property="og:description" content="75k+ Trophies Brawl Stars Pro & Content Creator">
    <meta property="og:image" content="https://i.ibb.co/zCxMt6J/a536a0dbdf6bad6160c800217589cdee-tplv-tiktokx-cropcenter-1080-1080.jpg">
    <meta name="theme-color" content="#3dd68c">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="liquid-bg" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <div class="noise" aria-hidden="true"></div>

    <button id="share-page-btn" class="share-fab" title="Seite teilen">
        <i class="fas fa-share-nodes"></i>
    </button>

    <main class="container" id="tilt-card">
        <header class="profile">
            <div class="avatar-wrap">
                <div class="status-dot" title="Online"></div>
                <img src="https://i.ibb.co/zCxMt6J/a536a0dbdf6bad6160c800217589cdee-tplv-tiktokx-cropcenter-1080-1080.jpg" alt="Stinge" class="avatar">
            </div>
            
            <h1 class="stagger" style="animation-delay: 0.1s;">Stinge</h1>
            <p class="tag stagger" style="animation-delay: 0.2s;">aka Woxrix</p>
            
            <div class="stats-grid stagger" style="animation-delay: 0.3s;">
                <div class="stat-item">
                    <i class="fas fa-trophy"></i>
                    <span class="stat-value" id="trophy-counter" data-target="75000">0</span>
                    <span class="stat-label">Trophäen</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <i class="fas fa-fire"></i>
                    <span class="stat-value">Pro</span>
                    <span class="stat-label">Creator</span>
                </div>
            </div>

            <p class="bio stagger" style="animation-delay: 0.4s;">
                Brawl Stars Enthusiast & Content Creator. <br>Täglich neue Clips auf TikTok.
            </p>
        </header>

        <nav class="links">
            <a href="https://www.tiktok.com/@woxrixbs" target="_blank" rel="noopener" class="link-btn stagger" style="animation-delay: 0.5s;">
                <div class="btn-icon"><i class="fab fa-tiktok"></i></div>
                <span class="btn-text">TikTok</span>
                <i class="fas fa-chevron-right btn-arrow"></i>
                <div class="btn-spotlight"></div>
            </a>

            <button type="button" class="link-btn stagger" id="copy-btn" style="animation-delay: 0.6s;">
                <div class="btn-icon"><i class="fas fa-gamepad"></i></div>
                <div class="btn-content">
                    <span class="btn-label">Player ID</span>
                    <span class="btn-text" id="id-text">#PRQ8L8G99</span>
                </div>
                <i class="fas fa-copy btn-arrow" id="copy-icon"></i>
                <div class="btn-spotlight"></div>
            </button>
        </nav>

        <footer class="stagger footer-text" style="animation-delay: 0.8s;">
            woxrix.aura
        </footer>
    </main>

    <script>
        const card = document.getElementById('tilt-card');
        const copyBtn = document.getElementById('copy-btn');
        const idText = document.getElementById('id-text');
        const copyIcon = document.getElementById('copy-icon');
        const shareBtn = document.getElementById('share-page-btn');
        const trophyElement = document.getElementById('trophy-counter');
        const playerID = "#PRQ8L8G99";

        // --- Trophäen Counter Animation ---
        function animateCounter() {
            const target = parseInt(trophyElement.getAttribute('data-target'));
            const duration = 2000; // 2 Sekunden
            const start = 0;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // Easing Funktion für sanftes Bremsen am Ende
                const easeOutQuad = t => t * (2 - t);
                const currentNumber = Math.floor(easeOutQuad(progress) * target);
                
                trophyElement.textContent = currentNumber.toLocaleString() + "+";

                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            requestAnimationFrame(update);
        }

        // Start der Animation nach dem Laden
        window.addEventListener('DOMContentLoaded', animateCounter);

        // --- Seite teilen ---
        shareBtn.addEventListener('click', () => {
            if (navigator.share) {
                navigator.share({ title: 'Stinge | Aura', url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Link kopiert!");
            }
        });

        // --- 3D Tilt (Desktop) ---
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth < 768) return;
            const { clientX, clientY } = e;
            const { innerWidth, innerHeight } = window;
            const x = ((clientX - innerWidth / 2) / innerWidth) * 15;
            const y = ((clientY - innerHeight / 2) / innerHeight) * -15;
            card.style.transform = `perspective(1000px) rotateX(${y}deg) rotateY(${x}deg)`;
        });

        // --- Button Glow & Copy ---
        document.querySelectorAll('.link-btn').forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                btn.style.setProperty('--x', `${e.clientX - rect.left}px`);
                btn.style.setProperty('--y', `${e.clientY - rect.top}px`);
            });
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(playerID).then(() => {
                const originalText = idText.textContent;
                idText.textContent = "Kopiert!";
                copyIcon.className = "fas fa-check";
                copyBtn.classList.add('copy-success');
                
                setTimeout(() => {
                    idText.textContent = originalText;
                    copyIcon.className = "fas fa-copy";
                    copyBtn.classList.remove('copy-success');
                }, 2000);
            });
        });
    </script>
</body>
</html>
