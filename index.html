<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stinge (aka Woxrix)</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Liquid blobs -->
    <div class="liquid-bg" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Noise -->
    <div class="noise" aria-hidden="true"></div>

    <main class="container" id="card">

        <div class="profile">
            <div class="avatar-wrap" style="--i:0">
                <div class="avatar-glow"></div>
                <img src="https://i.ibb.co/zCxMt6J/a536a0dbdf6bad6160c800217589cdee-tplv-tiktokx-cropcenter-1080-1080.jpg" alt="Profilbild" class="avatar">
                <span class="status-dot" id="status-dot" title="Offline"></span>
            </div>
            <h1 style="--i:1">Stinge</h1>
            <span class="tag" style="--i:2">aka Woxrix</span>
            <p class="bio" style="--i:3">Folg mir auf TikTok &mdash; Brawlstars 75k+ Spieler</p>
        </div>

        <div class="links">
            <a href="https://www.tiktok.com/@woxrixbs" target="_blank" rel="noopener" class="link-btn glass" style="--i:4">
                <div class="btn-icon">
                    <i class="fab fa-tiktok"></i>
                </div>
                <span class="btn-text">TikTok</span>
                <i class="fas fa-arrow-right btn-arrow"></i>
                <div class="btn-spotlight"></div>
            </a>
            <button onclick="copyId(this)" class="link-btn glass" style="--i:5">
                <div class="btn-icon">
                    <i class="fas fa-gamepad"></i>
                </div>
                <span class="btn-text">#PRQ8L8G99</span>
                <i class="fas fa-copy btn-arrow"></i>
                <div class="btn-spotlight"></div>
            </button>
        </div>

        <p class="footer-note" style="--i:6">woxrix.aura</p>
    </main>

    <script>
        // Copy ID
        function copyId(btn) {
            navigator.clipboard.writeText("#PRQ8L8G99").then(() => {
                btn.classList.add('copied');
                btn.querySelector('.btn-text').textContent = 'Kopiert!';
                btn.querySelector('.btn-arrow').className = 'fas fa-check btn-arrow';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.querySelector('.btn-text').textContent = '#PRQ8L8G99';
                    btn.querySelector('.btn-arrow').className = 'fas fa-copy btn-arrow';
                }, 1800);
            });
        }

        // 3D tilt + blob parallax
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const dx = (e.clientX - cx) / cx;
            const dy = (e.clientY - cy) / cy;

            // Tilt card
            card.style.transform =
                `perspective(900px) rotateY(${dx * 3}deg) rotateX(${-dy * 3}deg)`;

            // Parallax blobs
            document.querySelectorAll('.blob').forEach((blob, i) => {
                const s = (i + 1) * 12;
                blob.style.transform = `translate(${dx * s}px, ${dy * s}px)`;
            });
        });

        document.addEventListener('mouseleave', () => {
            card.style.transform = 'perspective(900px) rotateY(0deg) rotateX(0deg)';
        });

        // Button spotlight follows cursor
        document.querySelectorAll('.link-btn').forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                btn.style.setProperty('--mx', x + 'px');
                btn.style.setProperty('--my', y + 'px');
            });
        });
    </script>
</body>
</html>
