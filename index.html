<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stinge | Aura Pro</title>
    
    <meta property="og:title" content="Stinge | Aura">
    <meta property="og:description" content="75k+ Trophies Brawl Stars Pro & Content Creator">
    <meta property="og:image" content="https://i.ibb.co/zCxMt6J/a536a0dbdf6bad6160c800217589cdee-tplv-tiktokx-cropcenter-1080-1080.jpg">
    <meta name="theme-color" content="#3dd68c">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="liquid-bg" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <div class="noise" aria-hidden="true"></div>

    <button id="share-page-btn" class="share-fab" title="Seite teilen">
        <i class="fas fa-share-nodes"></i>
    </button>

    <main class="container" id="main-card">
        <div class="profile-section stagger">
            <div class="avatar-wrapper">
                <img src="https://i.ibb.co/zCxMt6J/a536a0dbdf6bad6160c800217589cdee-tplv-tiktokx-cropcenter-1080-1080.jpg" alt="Avatar" class="avatar">
                <div class="status-badge">ONLINE</div>
            </div>
            <h1 class="name">STINGE</h1>
            <p class="bio">Brawl Stars Pro & Content Creator</p>
            
            <div class="id-container" id="copy-id-btn">
                <span id="player-id-text">#2Y9Y9Y9Y</span>
                <i class="fas fa-copy" id="copy-icon"></i>
            </div>
        </div>

        <div class="progress-section stagger">
            <div class="progress-header">
                <span class="progress-title">Road to 80k</span>
                <span class="progress-stats">75.400 / 80.000</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="trophy-progress">
                    <div class="progress-glow"></div>
                </div>
            </div>
        </div>

        <div class="links-grid">
            <a href="#" class="link-btn stagger">
                <div class="btn-spotlight"></div>
                <div class="btn-icon"><i class="fab fa-youtube"></i></div>
                <div class="btn-content">
                    <span class="btn-label">YouTube</span>
                    <span class="btn-text">Latest Highlights</span>
                </div>
                <i class="fas fa-chevron-right btn-arrow"></i>
            </a>

            <a href="#" class="link-btn stagger">
                <div class="btn-spotlight"></div>
                <div class="btn-icon"><i class="fab fa-tiktok"></i></div>
                <div class="btn-content">
                    <span class="btn-label">TikTok</span>
                    <span class="btn-text">Daily Clips</span>
                </div>
                <i class="fas fa-chevron-right btn-arrow"></i>
            </a>

            <a href="#" class="link-btn stagger">
                <div class="btn-spotlight"></div>
                <div class="btn-icon"><i class="fab fa-discord"></i></div>
                <div class="btn-content">
                    <span class="btn-label">Discord</span>
                    <span class="btn-text">Join the Aura</span>
                </div>
                <i class="fas fa-chevron-right btn-arrow"></i>
            </a>
        </div>

        <footer class="footer stagger">
            <p>&copy; 2024 STINGE | AURA</p>
        </footer>
    </main>

    <script>
        const card = document.getElementById('main-card');
        const copyBtn = document.getElementById('copy-id-btn');
        const idText = document.getElementById('player-id-text');
        const copyIcon = document.getElementById('copy-icon');
        const playerID = idText.textContent;

        // Progress Bar Animation
        window.addEventListener('load', () => {
            const progressFill = document.getElementById('trophy-progress');
            // Berechne Prozent (75400 / 80000 * 100)
            const targetPercent = 94.25; 
            setTimeout(() => {
                progressFill.style.width = targetPercent + '%';
            }, 500);
        });

        // --- Tilt Effekt (Desktop) ---
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth < 768) return;
            const { clientX, clientY } = e;
            const { innerWidth, innerHeight } = window;
            const x = ((clientX - innerWidth / 2) / innerWidth) * 10;
            const y = ((clientY - innerHeight / 2) / innerHeight) * -10;
            card.style.transform = `perspective(1000px) rotateX(${y}deg) rotateY(${x}deg)`;
        });

        // --- Button Glow & Copy ---
        document.querySelectorAll('.link-btn').forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                btn.style.setProperty('--x', `${e.clientX - rect.left}px`);
                btn.style.setProperty('--y', `${e.clientY - rect.top}px`);
            });
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(playerID).then(() => {
                const originalText = idText.textContent;
                idText.textContent = "Kopiert!";
                copyIcon.className = "fas fa-check";
                copyBtn.classList.add('copy-success');
                
                setTimeout(() => {
                    idText.textContent = originalText;
                    copyIcon.className = "fas fa-copy";
                    copyBtn.classList.remove('copy-success');
                }, 2000);
            });
        });
    </script>
</body>
</html>
